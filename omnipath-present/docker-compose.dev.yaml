# Development docker-compose: Runs backend services only
# Use this with `npm run dev` in next-omnipath for local frontend development
#
# All services use the unified ./data/ directory:
#   - data/entity_identifier.parquet  (entity-service)
#   - data/omnipath_mi.obo            (ontology-service)
#   - data/dumps/latest.dump          (meilisearch)
#   - data/.data_version              (version marker)
#
# Run `make export` from the root to populate this directory.

services:
    # Meilisearch - Full-text search engine
    # Auto-imports dump when data version changes
    omnipath-meilisearch:
        image: getmeili/meilisearch:v1.16
        restart: unless-stopped
        environment:
            MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY:-devkey123}
            MEILI_ENV: ${MEILI_ENV:-development}
            MEILI_NO_ANALYTICS: "true"
        # Smart startup: auto-import dump when data version changes
        volumes:
            - meilisearch_data:/meili_data
            - ./data:/data:ro
            - ./scripts/meilisearch-start.sh:/scripts/meilisearch-start.sh:ro
        ports:
            - "7700:7700"
        command: ["/scripts/meilisearch-start.sh"]
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
            interval: 30s
            timeout: 10s
            retries: 5
            start_period: 60s

    # Entity Service - Parquet-based entity lookup
    entity-service:
        build:
            context: ./entity-service
            dockerfile: Dockerfile
        restart: unless-stopped
        environment:
            ENTITY_PARQUET_PATH: /data/entity_identifier.parquet
            BIND_ADDR: 0.0.0.0:8080
            RUST_LOG: ${RUST_LOG:-debug}
        ports:
            - "8080:8080"
        volumes:
            - ./data:/data:ro
        healthcheck:
            test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 10s

    # Ontology Service - FastAPI wrapper for ontograph
    ontology-service:
        build:
            context: ..
            dockerfile: omnipath-present/ontology-service/Dockerfile
        restart: unless-stopped
        environment:
            ONTOLOGY_DATA_DIR: /data
            ONTOLOGY_CACHE_DIR: /app/cache
        ports:
            - "8081:8081"
        volumes:
            - ./data:/data:ro
            - ./ontology-service/cache:/app/cache
            # Mount source for hot reload during development
            - ./ontology-service/ontology_service:/app/ontology_service

volumes:
    meilisearch_data:
        external: true
        name: omnipath_build_meilisearch_data
