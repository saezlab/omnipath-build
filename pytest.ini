[pytest]
# Pytest configuration for omnipath_build

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes

# Markers for categorizing tests
markers =
    unit: Unit tests for individual components
    integration: Integration tests using real data
    slow: Tests that take longer to run
    requires_data: Tests that require existing parquet files

# Ignore paths
norecursedirs =
    .git
    .tox
    dist
    build
    *.egg
    exploration
    databases/*/data

# Coverage options (if using pytest-cov)
# addopts = --cov=omnipath_build --cov-report=html --cov-report=term

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
