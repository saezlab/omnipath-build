services:
  postgres:
    # Custom postgres:18 with pg_roaringbitmap (+ rdkit) — REQUIRED: the build's
    # `derive` step creates the roaringbitmap extension (omnipath_build/db/bitmaps.py).
    # The stock postgres:18 image lacks it. See postgres/Dockerfile.
    build:
      context: ./postgres
      dockerfile: Dockerfile
    image: omnipath-build-postgres:18
    # Auto-start on host/daemon restart so the build DB survives reboots
    # without a manual `compose up`.
    restart: unless-stopped
    environment:
      POSTGRES_DB: omnipath
      POSTGRES_USER: omnipath
      POSTGRES_PASSWORD: omnipath
    ports:
      - "55432:5432"
    command:
      - postgres
      - -c
      - max_wal_size=8GB
      - -c
      - min_wal_size=1GB
      - -c
      - checkpoint_timeout=15min
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnipath -d omnipath"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres18_data:/var/lib/postgresql

volumes:
  postgres18_data:
