services:
  postgres:
    # Custom postgres:18 with pg_roaringbitmap (+ rdkit) — REQUIRED: the build's
    # `derive` step creates the roaringbitmap extension (omnipath_build/db/bitmaps.py).
    # The stock postgres:18 image lacks it. See postgres/Dockerfile.
    build:
      context: ./postgres
      dockerfile: Dockerfile
    image: omnipath-build-postgres:18
    # Auto-start on host/daemon restart so the build DB survives reboots
    # without a manual `compose up`.
    restart: unless-stopped
    environment:
      POSTGRES_DB: omnipath
      POSTGRES_USER: omnipath
      POSTGRES_PASSWORD: omnipath
    ports:
      - "55432:5432"
    # Docker defaults /dev/shm to 64MB, which is too small for the parallel-query
    # dynamic-shared-memory segments the metabo post-build (e.g. the Goslin lipid
    # labelling query) allocates — it failed with "could not resize shared memory
    # segment: No space left on device". The present deploy compose already sets
    # this; the build compose was missing it. (derive itself is serial INSERT…SELECT
    # so it never hit the limit.)
    shm_size: ${POSTGRES_SHM_SIZE:-1gb}
    command:
      - postgres
      - -c
      - max_wal_size=8GB
      - -c
      - min_wal_size=1GB
      - -c
      - checkpoint_timeout=15min
      - -c
      - shared_buffers=${POSTGRES_SHARED_BUFFERS:-512MB}
      - -c
      - effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE:-2GB}
      - -c
      - work_mem=${POSTGRES_WORK_MEM:-128MB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnipath -d omnipath"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres18_data:/var/lib/postgresql

volumes:
  postgres18_data:
