services:
    # Meilisearch - Full-text search engine
    omnipath-meilisearch:
        image: getmeili/meilisearch:v1.16
        restart: unless-stopped
        environment:
            MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
            MEILI_ENV: ${MEILI_ENV:-development}
            MEILI_NO_ANALYTICS: "true"
        volumes:
            - meilisearch_data:/meili_data
            - /root/omnipath2-data/dumps:/dumps:ro
        ports:
            - "7700:7700"
        # Import dump on startup if MEILI_IMPORT_DUMP is set
        # Usage: MEILI_IMPORT_DUMP=/dumps/latest.dump docker compose up
        command: >-
            sh -c "if [ -n \"$$MEILI_IMPORT_DUMP\" ] && [ -f \"$$MEILI_IMPORT_DUMP\" ]; then
                     meilisearch --import-dump \"$$MEILI_IMPORT_DUMP\";
                   else
                     meilisearch;
                   fi"
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
            interval: 30s
            timeout: 10s
            retries: 5
            start_period: 30s

    # Entity Service - Parquet-based entity lookup
    entity-service:
        build:
            context: ./entity-service
            dockerfile: Dockerfile
        restart: unless-stopped
        environment:
            ENTITY_PARQUET_PATH: /data/entity_identifier.parquet
            BIND_ADDR: 0.0.0.0:8080
            RUST_LOG: ${RUST_LOG:-info}
        volumes:
            - /root/omnipath2-data:/data:ro
        healthcheck:
            test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 10s

    # Next.js Frontend
    next-omnipath:
        build:
            context: ./next-omnipath
            dockerfile: Dockerfile
            args:
                NEXT_PUBLIC_ENVIRONMENT: ${NEXT_PUBLIC_ENVIRONMENT:-production}
                NEXT_PUBLIC_DOMAIN: ${NEXT_PUBLIC_DOMAIN:-localhost}
        restart: unless-stopped
        environment:
            # These are used at runtime for server-side requests
            MEILISEARCH_HOST: http://omnipath-meilisearch:7700
            MEILISEARCH_API_KEY: ${MEILI_MASTER_KEY}
            ENTITY_SERVICE_URL: http://entity-service:8080
            GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY}
        depends_on:
            omnipath-meilisearch:
                condition: service_healthy
            entity-service:
                condition: service_healthy

volumes:
    meilisearch_data:

