# Silver layer table definitions for metabo
# Define the structure of tables that will be created in the silver schema

compounds:
    source_database: VARCHAR
  # Type columns
    is_drug: BOOLEAN DEFAULT FALSE
    is_lipid: BOOLEAN DEFAULT FALSE
    is_metabolite: BOOLEAN DEFAULT FALSE

    synonyms: TEXT
  # ID columns - common database identifiers
    ids: VARCHAR # all ids in one column, seperated by |

  # Properties columns
    exact_mass: FLOAT8
    charge: INTEGER
    molecular_weight: FLOAT8
    logp: FLOAT8

  # classification columns
    classes: VARCHAR # all classification systems in one column, seperated by |. Within each system, levels are separated by $

  # Lipid-specific columns (LIPID MAPS/ SwissLipids ontology)
    lipid_classification_level: VARCHAR
    lipid_parent: VARCHAR
    lipid_components: TEXT

  # Drug-specific columns
    approval_phase: VARCHAR
    approval_year: INTEGER
    atc_codes: TEXT
    indications: TEXT

  # Structure columns
    formula: VARCHAR
    inchi: TEXT
    inchikey: VARCHAR
    smiles: TEXT

    pmids: TEXT # all pmids in one column, seperated by |

    loaded_at: TIMESTAMP DEFAULT CURRENT_TIMESTAMP
