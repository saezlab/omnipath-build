# SwissLipids Bronze Configuration for metabo database
metadata:
-   name: SwissLipids
-   description: SwissLipids database for lipid structures and annotations

module: swisslipids
functions:
    swisslipids_lipids:
        description: Downloads the full dataset from SwissLipids (https://www.swisslipids.org/).
        processing:
            target_table: compounds
            field_mapping:
            -   source: _constant
                target: is_lipid
                value: true
            -   source: [id, chebi, lipidmaps, hmdb, metanetx, name, synonyms]
                target: ids
                transform: combine_compound_ids_swisslipids
            -   source: level
                target: lipid_classification_level
            -   source: parent
                target: lipid_parent
            -   source: lipid_class
                target: classes
            -   source: components
                target: lipid_components
            -   source: smiles
                target: smiles
            -   source: pmids
                target: pmids
                transform: format_pmids
