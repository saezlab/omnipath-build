# Resource Configuration for hmdb.compounds_for_metabo
# Database: metabo

# REQUIRED: Fill in all question marks (?) before loading

metadata:
    name: HMDB
    description: Human Metabolome Database for metabolite structures and annotations
module: hmdb
functions:
    compounds_for_metabo:
        processing:
            target_table: compounds
            field_mapping:
            -   source: _constant
                target: is_metabolite
                value: true
            -   source: [chebi_id, accession, pubchem_compound_id, kegg_id, drugbank_id, cas_registry_number, synonyms]
                target: ids
                transform: combine_compound_ids_hmdb
            -   source: smiles
                target: smiles
            -   source: general_references
                target: pmids
                transform: format_pmids
