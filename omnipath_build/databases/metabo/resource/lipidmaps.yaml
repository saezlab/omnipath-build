metadata:
-   name: LipidMaps
-   description: LIPID MAPS Structure Database for lipid structures and annotations

module: lipidmaps
functions:
    lipidmaps_lipids:
        description: Download and open the SDF file with all LipidMaps (LMSD) structures.
        processing:
            target_table: compounds
            field_mapping:
            -   source: _constant
                target: is_lipid
                value: true
            -   source: [id, chebi, pubchem, name, synonyms]
                target: ids
                transform: combine_compound_ids_lipidmaps
            -   source: category
                target: classes
            -   source: main_class
                target: lipid_classification_level
            -   source: name
                target: lipid_parent
            -   source: abbreviation
                target: lipid_components
            -   source: smiles
                target: smiles
