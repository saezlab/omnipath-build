# SwissLipids Bronze Configuration for metabo database
metadata:
    name: SwissLipids
    description: SwissLipids database for lipid structures and annotations

module: swisslipids
functions:
    swisslipids_lipids:
        description: Downloads the full dataset from SwissLipids (https://www.swisslipids.org/).
        processing:
            target_table: silver_entities
            field_mapping:
            -   source: _constant
                target: source
                value: SwissLipids
            -   source: id
                target: accession
                transform: normalize_swisslipids_id
            -   source: inchikey
                target: inchikey
                transform: normalize_inchikey_value
            -   source: smiles
                target: smiles
            -   source: inchi
                target: inchi
                transform: normalize_inchi_value
            -   source: [chebi, null, null, null, null, lipidmaps, null, metanetx]
                target: cross_references
                transform: build_cross_references
            -   source: _constant
                target: entity_type
                value: compound
            -   source: name
                target: name
            -   source: synonyms
                target: synonyms
                transform: split_string_to_json
                transform_args:
                    delimiter: '; '
            -   source: [level, lipid_class, parent, components, pmids, charge]
                target: annotations
                transform: build_swisslipids_annotations
