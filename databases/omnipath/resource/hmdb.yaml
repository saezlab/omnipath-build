# Resource Configuration for hmdb.compounds_for_metabo
# Database: metabo

# REQUIRED: Fill in all question marks (?) before loading

metadata:
    name: HMDB
    description: Human Metabolome Database for metabolite structures and annotations
module: hmdb
functions:
    compounds_for_metabo:
        processing:
            target_table: silver_entities
            field_mapping:
            -   source: _constant
                target: entity_type
                value: compound
            -   source: inchikey
                target: identifier
            -   source: _constant
                target: identifier_type
                value: inchikey
            -   source: [accession, chebi_id, pubchem_compound_id, kegg_id, drugbank_id, cas_registry_number]
                target: additional_identifiers
                transform: build_identifier_list_hmdb
            -   source: [iupac_name, traditional_iupac]
                target: name
                transform: coalesce
            -   source: synonyms
                target: name_variants
                transform: to_json
            -   source: chemical_formula
                target: compound_formula
            -   source: smiles
                target: compound_smiles
            -   source: inchi
                target: compound_inchi
            -   source: average_molecular_weight
                target: molecular_weight
            -   source: monisotopic_molecular_weight
                target: exact_mass
            -   source: _constant
                target: is_valid
                value: true
            -   source: _constant
                target: processed_by
                value: hmdb_compounds_for_metabo
            -   source: metadata_row_number
                target: bronze_record_id
            -   source: _metadata
                target: created_at
                value: current_timestamp
            -   source: _metadata
                target: updated_at
                value: current_timestamp
