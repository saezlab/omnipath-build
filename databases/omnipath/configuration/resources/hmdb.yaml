# Resource Configuration for hmdb.compounds_for_metabo
# Database: metabo

# REQUIRED: Fill in all question marks (?) before loading

metadata:
    name: HMDB
    description: Human Metabolome Database for metabolite structures and annotations
module: hmdb
functions:
    compounds_for_metabo:
        processing:
            target_table: silver_entities
            field_mapping:
            -   source: _constant
                target: source
                value: HMDB
            -   source: accession
                target: accession
                transform: normalize_hmdb_id
            -   source: inchikey
                target: inchikey
                transform: normalize_inchikey_value
            -   source: smiles
                target: smiles
            -   source: inchi
                target: inchi
                transform: normalize_inchi_value
            -   source: [chebi_id, pubchem_compound_id, kegg_id, drugbank_id, cas_registry_number, null, null, null]
                target: cross_references
                transform: build_cross_references
            -   source: _constant
                target: entity_type
                value: compound
