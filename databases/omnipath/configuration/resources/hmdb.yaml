# Resource Configuration for hmdb.compounds_for_metabo
# Database: metabo

# REQUIRED: Fill in all question marks (?) before loading

metadata:
    name: HMDB
    description: Human Metabolome Database for metabolite structures and annotations
module: hmdb
functions:
    compounds_for_metabo:
        processing:
            target_table: silver_entities
            field_mapping:
            -   source: _constant
                target: entity_type
                value: compound
            -   source: inchikey
                target: inchikey
                transform: normalize_inchikey_value
            -   source: accession
                target: hmdb_id
                transform: normalize_hmdb_id
            -   source: chebi_id
                target: chebi_id
                transform: normalize_chebi_id
            -   source: smiles
                target: smiles
            -   source: pubchem_compound_id
                target: pubchem_cid
                transform: normalize_pubchem_cid
            -   source: kegg_id
                target: kegg_id
                transform: normalize_kegg_id
            -   source: drugbank_id
                target: drugbank_id
                transform: normalize_drugbank_id
            -   source: cas_registry_number
                target: cas_number
                transform: normalize_cas_number
            -   source: _constant
                target: processed_by
                value: hmdb_compounds_for_metabo
            -   source: metadata_row_number
                target: bronze_record_id
            -   source: _metadata
                target: created_at
                value: current_timestamp
            -   source: _metadata
                target: updated_at
                value: current_timestamp
