metadata:
    name: LipidMaps
    description: LIPID MAPS Structure Database for lipid structures and annotations

module: lipidmaps
functions:
    lipidmaps_lipids:
        description: Download and open the SDF file with all LipidMaps (LMSD) structures.
        processing:
            target_table: silver_entities
            field_mapping:
            -   source: _constant
                target: entity_type
                value: compound
            -   source: inchikey
                target: identifier
            -   source: _constant
                target: identifier_type
                value: inchikey
            -   source: [id, chebi, pubchem, inchi, smiles, name, synonyms, abbreviation]
                target: additional_identifiers
                transform: build_identifier_list_lipidmaps
            -   source: [category, main_class]
                target: annotations
                transform: build_lipidmaps_annotations
            -   source: _constant
                target: processed_by
                value: lipidmaps_lipids
            -   source: metadata_row_number
                target: bronze_record_id
            -   source: _metadata
                target: created_at
                value: current_timestamp
            -   source: _metadata
                target: updated_at
                value: current_timestamp
