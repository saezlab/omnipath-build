# SwissLipids Bronze Configuration for metabo database
metadata:
    name: SwissLipids
    description: SwissLipids database for lipid structures and annotations

module: swisslipids
functions:
    swisslipids_lipids:
        description: Downloads the full dataset from SwissLipids (https://www.swisslipids.org/).
        processing:
            target_table: silver_entities
            field_mapping:
            -   source: _constant
                target: entity_type
                value: compound
            -   source: inchikey
                target: inchikey
                transform: normalize_inchikey_value
            -   source: id
                target: swisslipids_id
                transform: normalize_swisslipids_id
            -   source: chebi
                target: chebi_id
                transform: normalize_chebi_id
            -   source: lipidmaps
                target: lipidmaps_id
                transform: normalize_lipidmaps_id
            -   source: hmdb
                target: hmdb_id
                transform: normalize_hmdb_id
            -   source: metanetx
                target: metanetx_id
                transform: normalize_metanetx_id
            -   source: inchi
                target: inchi
                transform: normalize_inchi_value
            -   source: smiles
                target: smiles
            -   source: name
                target: name
            -   source: synonyms
                target: name_variants
                transform: split_string_to_json
                transform_args:
                    delimiter: '; '
            -   source: [level, lipid_class, parent, components, pmids, charge]
                target: annotations
                transform: build_swisslipids_annotations
