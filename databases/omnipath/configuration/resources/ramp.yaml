# Resource Configuration for ramp.ramp_omnipathmetabo
# Database: metabo

# REQUIRED: Fill in all question marks (?) before loading

metadata:
    name: RaMP
    description: RaMP (Relational database of Metabolomics Pathways) for metabolite and gene/protein annotations
module: ramp
functions:
    ramp_omnipathmetabo:
        description: Retrieve RaMP database contents from its SQLite build for the omnipath.metabo database build.
        processing:
            target_table: silver_entities
            field_mapping:
            -   source: _constant
                target: entity_type
                value: compound
            -   source: inchi_key
                target: inchikey
                transform: normalize_inchikey_value
            -   source: ramp_id
                target: ramp_id
                transform: normalize_ramp_id
            -   source: inchi
                target: inchi
                transform: normalize_inchi_value
            -   source: iso_smiles
                target: smiles
            -   source: common_name
                target: name
            -   source: classes
                target: annotations
                transform: build_ramp_annotations
            -   source: chem_data_source
                target: primary_source_database
            # Extract cross-reference IDs from sources column
            # Sources contains comma-separated CURIEs like: "hmdb:HMDB0000001, pubchem:441294, chebi:28624, ..."
            # Using extract_ids() to get ALL distinct IDs of each type as arrays
            # Note: 38.5% of records have multiple DIFFERENT hmdb IDs (see ramp_sources_analysis_report.md)
            -   source: sources
                target: hmdb_ids
                transform: extract_ids
                transform_args:
                    prefix: hmdb
            -   source: sources
                target: pubchem_ids
                transform: extract_ids
                transform_args:
                    prefix: pubchem
            -   source: sources
                target: chebi_ids
                transform: extract_ids
                transform_args:
                    prefix: chebi
            -   source: sources
                target: chemspider_ids
                transform: extract_ids
                transform_args:
                    prefix: chemspider
            -   source: sources
                target: lipidmaps_ids
                transform: extract_ids
                transform_args:
                    prefix: LIPIDMAPS
            -   source: sources
                target: swisslipids_ids
                transform: extract_ids
                transform_args:
                    prefix: swisslipids
            -   source: sources
                target: cas_numbers
                transform: extract_ids
                transform_args:
                    prefix: CAS
            -   source: sources
                target: kegg_ids
                transform: extract_ids
                transform_args:
                    prefix: kegg
            -   source: sources
                target: wikidata_ids
                transform: extract_ids
                transform_args:
                    prefix: wikidata
            -   source: sources
                target: lipidbank_ids
                transform: extract_ids
                transform_args:
                    prefix: lipidbank
            -   source: sources
                target: plantfa_ids
                transform: extract_ids
                transform_args:
                    prefix: plantfa
