# Resource Configuration for bindingdb
# Database: omnipath

module: bindingdb
functions:
    interactions:
        description: Yields interactions from BindingDB.
        kwargs:
            dataset: All
            max_lines:
        processing:
            target_table: '?'
            field_mapping:
            -   source: ligand
                target: '?'
            -   source: target
                target: '?'
