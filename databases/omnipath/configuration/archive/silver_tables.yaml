silver_entities:
  # Identifiers (cleaned)
    source: VARCHAR(100)
    accession: VARCHAR(255)          # Unique within source
    inchikey: VARCHAR(27)             # Primary structural identifier when available
    smiles: TEXT
    inchi: TEXT
    cross_references: JSON         # [ {"type": "chebi", "value": "CHEBI:12345"},{"type": "kegg_compound", "value": "C00001"}, {"type": "kegg_compound", "value": "C00002"}]
  # Entity type
    entity_type: VARCHAR(50)          # 'protein', 'gene', 'compound',
  # Names (cleaned)
    name: TEXT
    synonyms: JSON               # ["synonym1", "synonym2"]

  # Complex/membership info (as provided by source)
    members: JSON             # [{"member_id": "...", "member_id_type": "...", "stoichiometry": 2, "role": "..."}]

  # Annotations (as provided by source)
    annotations: JSON                 # [{"term": "...", "value": "...", "units": "..."}]
    references: JSON                 # [12345678, 23456789] (PMIDs e.g.)

  # Metadata (if provided by meta database)
    secondary_source: VARCHAR(100)


## 2. silver_interactions

# Cleaned interaction records (one row per source evidence record, before deduplication)
silver_interactions:
  # Interaction participants (cleaned references)
    entity_a_identifier: VARCHAR(255)
    entity_a_identifier_type: VARCHAR(100)
    entity_a_name: TEXT
    entity_b_identifier: VARCHAR(255)
    entity_b_identifier_type: VARCHAR(100)
    entity_b_name: TEXT

  # Evidence details (cleaned/normalized)
    interaction_type: VARCHAR(100)     # 'physical association', 'phosphorylation', etc. accessions
    detection_method: VARCHAR(255)
    is_directed: BOOLEAN
    direction: VARCHAR(50)             # optional ('a_to_b', 'b_to_a', 'bidirectional')
    sign: VARCHAR(50)                  # 'positive', 'negative', 'neutral', 'unknown' accessions
    causal_mechanism: VARCHAR(255)
    causal_statement: TEXT
    sentence: TEXT                     # Extracted sentence from paper

  # Annotations (cleaned)
    interaction_annotations: JSON     # General interaction annotations
    entity_a_context: JSON            # Context annotations for entity A
    entity_b_context: JSON            # Context annotations for entity B

  # Reference (cleaned/normalized)
    reference_type: VARCHAR(50)        # 'pubmed', 'doi', 'isbn', etc.
    reference_value: TEXT              # PMID, DOI, etc. (normalized format)

  # Metadata
    source: VARCHAR(100)


## 3. silver_cv_terms

# Controlled vocabulary terms from sources (one row per source term)
silver_cv_terms:
  # Term identification
    term_name: VARCHAR(500)           # The actual term/value
    term_accession: VARCHAR(100) PRIMARY KEY # Formal accession if available (e.g., 'GO:0008150')
    namespace: VARCHAR(255)

  # Term metadata (if provided by source)
    term_definition: TEXT
    term_definition_refs: JSON
    term_synonyms: JSON               # ["synonym1", "synonym2"]
    term_parent_accessions: JSON      # ["GO:0008150", "GO:0009987"]
    term_parent_names: JSON
    term_alt_ids: JSON

  # Metadata
    source: VARCHAR(100)
