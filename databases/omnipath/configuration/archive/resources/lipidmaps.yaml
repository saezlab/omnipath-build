metadata:
    name: LipidMaps
    description: LIPID MAPS Structure Database for lipid structures and annotations

module: lipidmaps
functions:
    lipidmaps_lipids:
        description: Download and open the SDF file with all LipidMaps (LMSD) structures.
        processing:
            target_table: silver_entities
            field_mapping:
            -   source: _constant
                target: source
                value: LipidMaps
            -   source: id
                target: accession
                transform: normalize_lipidmaps_id
            -   source: inchikey
                target: inchikey
                transform: normalize_inchikey_value
            -   source: smiles
                target: smiles
            -   source: inchi
                target: inchi
                transform: normalize_inchi_value
            -   source: [chebi, pubchem, null, null, null, null, null, null]
                target: cross_references
                transform: build_cross_references
            -   source: _constant
                target: entity_type
                value: compound
            -   source: name
                target: name
            -   source: synonyms
                target: synonyms
                transform: split_string_to_json
                transform_args:
                    delimiter: '; '
            -   source: [category, main_class]
                target: annotations
                transform: build_lipidmaps_annotations
